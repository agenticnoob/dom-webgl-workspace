name: Release alpha

on:
  workflow_dispatch:
    inputs:
      version:
        description: Lockstep alpha version to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use npm 11
        run: npm install --global npm@11
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Verify release candidate
        run: npm run verify:release
      - run: git diff --check
      - name: Publish core then adapters with alpha tag and provenance
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          # Bootstrap only. Delete this Environment secret after Trusted Publishing is configured.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release:publish -- "$RELEASE_VERSION"
